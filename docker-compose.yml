version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: revix-postgres
    environment:
      POSTGRES_USER:     revix
      POSTGRES_PASSWORD: revix
      POSTGRES_DB:       revix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: revix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: